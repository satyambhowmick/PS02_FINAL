<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes AI | PS-02</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand: #6366f1; --brand-hover: #4f46e5;
            --bg: #0f172a; --card: #1e293b;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #312e81, transparent);
            color: var(--text-main); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            width: 90%; max-width: 800px; background: var(--card); 
            padding: 40px; border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 32px; font-weight: 800; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-dim); margin-bottom: 30px; font-size: 15px; }
        
        textarea { 
            width: 100%; height: 180px; padding: 20px; border-radius: 16px; 
            background: rgba(15, 23, 42, 0.5); border: 1px solid #334155;
            color: white; font-size: 16px; font-family: inherit; box-sizing: border-box;
            transition: all 0.3s ease; outline: none; margin-bottom: 20px;
        }
        textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        .btn-group { display: flex; gap: 12px; }
        button { 
            flex: 1; padding: 16px; border-radius: 14px; border: none; 
            font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 15px;
        }
        .btn-primary { background: var(--brand); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-primary:hover { background: var(--brand-hover); transform: translateY(-2px); }
        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }

        #loading { display: none; margin: 20px 0; color: var(--brand); font-weight: 600; text-align: center; }
        
        .result-area { display: none; margin-top: 35px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .section-label { color: var(--brand); text-transform: uppercase; letter-spacing: 1px; font-size: 12px; font-weight: 800; margin-bottom: 10px; }
        .summary-text { line-height: 1.7; font-size: 16px; color: #cbd5e1; margin-bottom: 30px; }
        
        .action-card { 
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: flex-start; gap: 12px;
        }
        .action-card span { font-size: 14px; line-height: 1.5; }
        .dot { height: 8px; width: 8px; background: var(--brand); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Notes AI</h1>
    <p class="subtitle">Transforming messy meetings into crystal-clear actions.</p>

    <textarea id="noteInput" placeholder="Paste your raw notes or transcript here..."></textarea>

    <div class="btn-group">
        <button class="btn-primary" onclick="generateAI()">✨ Analyze Notes</button>
        <button class="btn-secondary" onclick="copyMD()">📋 Copy Markdown</button>
    </div>

    <div id="loading">🔮 AI is de-cluttering your notes...</div>

    <div id="result" class="result-area">
        <div class="section-label">Summary</div>
        <p id="summaryDisplay" class="summary-text"></p>
        
        <div class="section-label">Action Items</div>
        <div id="actionsDisplay"></div>
    </div>
</div>

<script>
    const API_KEY = "__API_KEY_PLACEHOLDER__";

    // Persistence: Load previous notes
    window.onload = () => {
        const cached = localStorage.getItem('meeting_cache');
        if(cached) document.getElementById('noteInput').value = cached;
    };

    async function generateAI() {
        const input = document.getElementById('noteInput').value;
        if(!input) return alert("Please enter some notes!");

        localStorage.setItem('meeting_cache', input);
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        const prompt = `Convert the following notes into a JSON object. 
        Structure: {"summary": "Brief overview", "actions": ["Action 1", "Action 2"]}.
        Notes: ${input}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            if (!data.candidates) throw new Error("Invalid API Key or Limit reached.");

            let rawText = data.candidates[0].content.parts[0].text;
            const cleanJSON = JSON.parse(rawText.replace(/```json|```/g, ""));

            // Render UI
            document.getElementById('summaryDisplay').innerText = cleanJSON.summary;
            document.getElementById('actionsDisplay').innerHTML = cleanJSON.actions.map(a => `
                <div class="action-card">
                    <div class="dot"></div>
                    <span>${a}</span>
                </div>
            `).join('');

            document.getElementById('result').style.display = 'block';
        } catch (err) {
            alert("Oops! " + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function copyMD() {
        const sum = document.getElementById('summaryDisplay').innerText;
        const acts = Array.from(document.querySelectorAll('.action-card span')).map(s => "- " + s.innerText).join('\n');
        navigator.clipboard.writeText(`# Summary\n${sum}\n\n# Actions\n${acts}`);
        alert("Formatted Markdown copied!");
    }
</script>

</body>
</html>
